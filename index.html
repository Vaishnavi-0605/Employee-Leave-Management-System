<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login page</title>
    <link rel="stylesheet" href="style.css">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@100..900&display=swap" rel="stylesheet">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@200..800&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container">
        <div class="main">
            <div class="text-content">
                <h1>Welcome, User!</h1>
                <p>Sign in to continue to your Employee Portal</p>
            </div>
            <div class="form-area">
                <div class="login-form">
                    <input type="text" name="" id="email" placeholder="Enter your email"/> <br>
                    <input type="password" name="" id="pass" placeholder="Enter your password"> <br>
                    <button type="submit" id="login-btn"> Login </button>
                </div>
                <div class="divider">
                    <hr>
                    <span>or</span>
                    <hr>
                </div>
                <div class="more-opts">
                    <div class="opts">
                        <img src="./images/img1-google.jpg" alt="">
                        <p> Google </p>
                    </div>
                    <div class="opts">
                        <img src="./images/img2-ms-outlook.jpg" alt="">
                        <p> Microsoft </p>
                    </div>
                    <div class="opts">
                        <img src="./images/img3-github.jpg" alt="">
                        <p> Github </p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="./script.js"></script>
</body>
</html>
