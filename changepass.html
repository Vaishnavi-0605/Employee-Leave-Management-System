<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Change Password</title>
    <link rel="stylesheet" href="/css/changepass.css">
</head>
<body>
    <div class="container">
        <div class="changepass">
            <h2>Change Password</h2>
            <form action="">
                <input type="text" placeholder="Enter your old password" class="oldpass">
                <input type="text" placeholder="Enter New Password" class="oldpass">
                <input type="text" placeholder="Re-enter new password" class="newpass">
                <button type="submit" id="cp">Change Password</button>
            </form>
        </div>
    </div>

    <script src="./js/cp.js"></script>
</body>
</html>
